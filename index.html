const store = {
  mem:{},
  async get(key){
    try{ if(window.storage && window.storage.get){ const r = await window.storage.get(key); return r ? r.value : null; } }catch(e){}
    return (key in this.mem) ? this.mem[key] : null;
  },
  async set(key,val){
    this.mem[key]=val;
    try{ if(window.storage && window.storage.set){ await window.storage.set(key,val); } }catch(e){}
  }
};

function ymd(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,'0'); const d=String(date.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; }
function calcStreak(dates){
  const set=new Set(dates); let s=0; let cur=new Date();
  if(!set.has(ymd(cur))) cur.setDate(cur.getDate()-1);
  while(set.has(ymd(cur))){ s++; cur.setDate(cur.getDate()-1); }
  return s;
}
function weekDatesCount(dates){
  const now=new Date(); const day=(now.getDay()+6)%7;
  const start=new Date(now); start.setDate(now.getDate()-day); start.setHours(0,0,0,0);
  return dates.filter(d=>{ const dt=new Date(d+'T00:00:00'); return dt>=start; }).length;
}
function beep(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    const c=new Ctx(); const o=c.createOscillator(); const g=c.createGain();
    o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=820;
    g.gain.setValueAtTime(.001,c.currentTime); g.gain.exponentialRampToValueAtTime(.25,c.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5); o.start(); o.stop(c.currentTime+.52);
  }catch(e){}
}

function Ring({ value, size=70, stroke=8, color="#C96442", label, sub }){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-Math.min(value,1));
  return (
    <div className="relative inline-flex items-center justify-center shrink-0" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle className="ringtrack" cx={size/2} cy={size/2} r={r} strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} strokeWidth={stroke} fill="none" stroke={color}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{transition:'stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1)'}}
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <div className="absolute text-center leading-none">
        <div className="font-extrabold" style={{fontSize:size*0.26,color:'var(--ink)'}}>{label}</div>
        {sub && <div className="font-bold" style={{fontSize:size*0.13,color:'var(--muted)'}}>{sub}</div>}
      </div>
    </div>
  );
}

/* ============================ REST TIMER ============================ */
function RestTimer({ total, onClose, nextLabel }){
  const [t,setT]=useState(total);
  const ref=useRef(null);
  useEffect(()=>{
    ref.current=setInterval(()=>{ setT(p=>{ if(p<=1){ clearInterval(ref.current); beep(); setTimeout(onClose,400); return 0; } return p-1; }); },1000);
    return ()=>clearInterval(ref.current);
  },[]);
  const pct=t/total;
  const mm=Math.floor(t/60), ss=String(t%60).padStart(2,'0');
  return (
    <div className="timer-back" onClick={onClose}>
      <div className="card pop p-6 sm:p-7 text-center w-full max-w-[300px]" onClick={e=>e.stopPropagation()}>
        <div className="text-xs font-extrabold tracking-widest uppercase" style={{color:'var(--clay)'}}>Rest</div>
        <div className="my-4 flex justify-center">
          <Ring value={pct} size={140} stroke={12} color="#C96442" label={`${mm}:${ss}`} />
        </div>
        {nextLabel && <div className="text-sm font-bold mb-4 px-2" style={{color:'var(--ink2)'}}>Next: <span className="grad-text">{nextLabel}</span></div>}
        <div className="flex gap-2 justify-center">
          <button onClick={()=>setT(p=>p+15)} className="pill soft px-5 py-2.5 font-extrabold text-sm" style={{color:'var(--ink2)'}}>+15s</button>
          <button onClick={onClose} className="pill clay-grad text-white px-6 py-2.5 rounded-2xl font-extrabold text-sm shadow-md">Skip ›</button>
        </div>
      </div>
    </div>
  );
}

/* ============================ EXERCISE ITEM ============================ */
function ExItem({ id, e, done, onToggle, onRest }){
  const restSecs = (()=>{ const m=(e.rest||'').match(/(\d+)/); return m?parseInt(m[1]):60; })();
  const hasRest = e.rest && e.rest!=='—';
  return (
    <div className={`soft p-3 flex gap-2.5 items-start ${done?'seg':''}`} style={done?{background:'#F1F5EC',borderColor:'#D8E6CC'}:{}}>
      <button onClick={onToggle} aria-label="toggle complete"
        className={`pill shrink-0 mt-0.5 w-8 h-8 rounded-xl flex items-center justify-center font-black text-sm ${done?'sage-grad text-white check-anim':'bg-white'}`}
        style={done?{}:{border:'2px solid #E3D8C7',color:'transparent'}}>
        {done?'✓':''}
      </button>
      <div className="flex-1 min-w-0">
        <div className="flex items-baseline justify-between gap-2">
          <span className="font-extrabold text-[14.5px] leading-snug min-w-0 break-words" style={{color:done?'#5F744F':'var(--ink)', textDecoration:done?'line-through':'none'}}>{e.name}</span>
          <span className="shrink-0 whitespace-nowrap font-extrabold text-[12.5px]" style={{color:'var(--clay)'}}>{e.detail}</span>
        </div>
        <p className="text-[12px] mt-0.5 leading-snug" style={{color:'var(--muted)'}}>{e.desc}</p>
        {hasRest &&
          <button onClick={()=>onRest(restSecs, e.name)}
            className="pill mt-2 inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-[11.5px] font-extrabold"
            style={{background:'#FBEFE6',color:'var(--clay-deep)',border:'1px solid #F0DCCB'}}>
            ⏱ Rest {e.rest}
          </button>}
      </div>
    </div>
  );
}

/* ============================ WORKOUT DAY ============================ */
function WorkoutDay({ dayKey, data, progress, toggle, resetDay, onRest, openDefault, isToday }){
  const [open,setOpen]=useState(openDefault);
  const allIds=[]; data.blocks.forEach((b,bi)=>b.exercises.forEach((e,ei)=>allIds.push(`${dayKey}-${bi}-${ei}`)));
  const doneCount=allIds.filter(id=>progress[id]).length;
  const total=allIds.length;
  const pct= total? doneCount/total : 0;
  const complete= total>0 && doneCount===total;
  const accent = data.type==='strength'?'clay-grad': data.type==='hiit'?'amber-grad': data.type==='recovery'?'sage-grad':'ink-grad';

  return (
    <div className={`card overflow-hidden ${isToday?'glow':''}`}>
      <button onClick={()=>setOpen(o=>!o)} className="w-full text-left block">
        <div className={`relative ${accent} noise p-4 sm:p-5 text-white`}>
          <div className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-3 min-w-0">
              <div className="text-2xl sm:text-3xl shrink-0">{data.icon}</div>
              <div className="min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <h3 className="text-lg sm:text-xl font-black">{dayKey}</h3>
                  {isToday && <span className="text-[10px] font-black bg-white/25 px-2 py-0.5 rounded-full tracking-wide">TODAY</span>}
                </div>
                <p className="text-[13px] sm:text-sm font-bold text-white/90 leading-snug">{data.focus}</p>
                <p className="text-[11px] font-bold text-white/75 mt-0.5">{data.tag} · {data.duration}</p>
              </div>
            </div>
            <div className="shrink-0">
              {total>0 ?
                <Ring value={pct} size={52} stroke={6} color="#fff"
                  label={complete?'✓':`${doneCount}`} sub={complete?'':`/ ${total}`} /> :
                <span className="text-2xl pr-1">›</span>}
            </div>
          </div>
        </div>
      </button>

      {open &&
      <div className="p-3.5 sm:p-5 rise">
        <div className="soft p-3.5 mb-4" style={{background:'#FBF4EA'}}>
          <p className="text-[13px] font-semibold leading-snug" style={{color:'var(--ink2)'}}>{data.blurb}</p>
        </div>

        {data.type!=='rest' && data.type!=='recovery' &&
          <div className="mb-4">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-base">🔥</span>
              <h4 className="font-black text-[15px]" style={{color:'var(--ink)'}}>Warm-up <span className="font-bold text-[12px]" style={{color:'var(--muted)'}}>· {WARMUP.duration}</span></h4>
            </div>
            <div className="soft p-3 grid sm:grid-cols-2 gap-x-4 gap-y-1.5">
              {WARMUP.items.map((w,i)=><div key={i} className="text-[12.5px] font-semibold flex gap-2" style={{color:'var(--ink2)'}}><span style={{color:'var(--clay)'}}>•</span>{w}</div>)}
            </div>
          </div>}

        {data.blocks.map((b,bi)=>(
          <div key={bi} className="mb-4">
            <div className="flex items-start justify-between gap-2 mb-2">
              <h4 className="font-black text-[14.5px] min-w-0" style={{color:'var(--ink)'}}>{b.name}</h4>
              <span className="shrink-0 text-[10.5px] font-extrabold px-2 py-1 rounded-lg text-right" style={{background:'#F1EADC',color:'var(--ink2)'}}>{b.meta}</span>
            </div>
            <div className="space-y-2">
              {b.exercises.map((e,ei)=>{ const id=`${dayKey}-${bi}-${ei}`; return (
                <ExItem key={id} id={id} e={e} done={!!progress[id]} onToggle={()=>toggle(id)} onRest={onRest}/>
              );})}
            </div>
          </div>
        ))}

        {data.cooldown &&
          <div className="mb-2">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-base">🧘</span>
              <h4 className="font-black text-[15px]" style={{color:'var(--ink)'}}>{data.type==='rest'?'Reminders':'Cool-down & Stretch'}</h4>
            </div>
            <div className="soft p-3 grid sm:grid-cols-2 gap-x-4 gap-y-1.5" style={{background:'#F2F5EE'}}>
              {data.cooldown.map((c,i)=><div key={i} className="text-[12.5px] font-semibold flex gap-2" style={{color:'var(--sage-deep)'}}><span>•</span>{c}</div>)}
            </div>
          </div>}

        {total>0 && doneCount>0 &&
          <div className="flex items-center justify-between gap-2 mt-4 pt-3" style={{borderTop:'1px solid var(--line)'}}>
            <span className="text-[12px] font-extrabold min-w-0" style={{color: complete?'var(--sage-deep)':'var(--muted)'}}>
              {complete? '🏆 Day complete — great work!' : `${doneCount} of ${total} done`}
            </span>
            <button onClick={()=>resetDay(allIds)} className="pill shrink-0 text-[12px] font-extrabold px-3 py-1.5 rounded-lg" style={{color:'var(--clay-deep)',background:'#FBEFE6'}}>Reset</button>
          </div>}
      </div>}
    </div>
  );
}

/* ============================ APP ============================ */
function App(){
  const [tab,setTab]=useState("today");
  const [progress,setProgress]=useState({});
  const [completedDates,setCompletedDates]=useState([]);
  const [weightLog,setWeightLog]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [rest,setRest]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const [quote]=useState(QUOTES[Math.floor(Math.random()*QUOTES.length)]);

  const today = new Date().toLocaleDateString('en-US',{weekday:'long'});
  const todayData = PROGRAM[today] || PROGRAM.Monday;

  useEffect(()=>{ (async()=>{
    const raw=await store.get('madfit_v1');
    if(raw){ try{ const d=JSON.parse(raw); setProgress(d.progress||{}); setCompletedDates(d.completedDates||[]); setWeightLog(d.weightLog||[]); }catch(e){} }
    setLoaded(true);
  })(); },[]);

  useEffect(()=>{ if(loaded) store.set('madfit_v1', JSON.stringify({progress,completedDates,weightLog})); },[progress,completedDates,weightLog,loaded]);

  const dayIds = useCallback((dk)=>{ const ids=[]; const d=PROGRAM[dk]; d.blocks.forEach((b,bi)=>b.exercises.forEach((e,ei)=>ids.push(`${dk}-${bi}-${ei}`))); return ids; },[]);

  const checkComplete = useCallback((np)=>{
    const ids=dayIds(today); if(ids.length===0) return;
    const all=ids.every(id=>np[id]);
    if(all){
      const d=ymd(new Date());
      setCompletedDates(prev=> prev.includes(d)?prev:[...prev,d]);
      setConfetti(true); beep(); setTimeout(()=>setConfetti(false),2600);
    }
  },[today,dayIds]);

  const toggle = (id)=> setProgress(p=>{ const np={...p}; if(np[id]) delete np[id]; else np[id]=true; checkComplete(np); return np; });
  const resetDay = (ids)=> setProgress(p=>{ const np={...p}; ids.forEach(id=>delete np[id]); return np; });
  const addWeight = (v)=> setWeightLog(l=>[...l,{v, d:new Date().toLocaleDateString('en-US',{day:'numeric',month:'short'})}]);
  const onRest = (secs,label)=> setRest({secs,label});

  const streak = calcStreak(completedDates);
  const weekCount = weekDatesCount(completedDates);

  const tabs=[
    {k:"today",label:"Today",icon:"🏠"},
    {k:"plan",label:"Plan",icon:"📋"},
    {k:"eat",label:"Eat",icon:"🥗"},
    {k:"learn",label:"Learn",icon:"🧠"},
  ];

  return (
    <div className="min-h-screen pad-nav">
      {/* top bar */}
      <div className="sticky top-0 z-40 top-safe" style={{background:'rgba(250,248,243,.85)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--line)'}}>
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2.5 min-w-0">
            <div className="w-9 h-9 rounded-xl clay-grad flex items-center justify-center text-white font-black text-lg shadow shrink-0">M</div>
            <div className="leading-none min-w-0">
              <div className="font-black text-[16px] sm:text-[17px] tracking-tight" style={{color:'var(--ink)'}}>MAD<span className="grad-text">FIT</span></div>
              <div className="text-[10px] font-bold truncate" style={{color:'var(--muted)'}}>Lean & Strong · @madvibe</div>
            </div>
          </div>
          <div className="text-[11px] font-extrabold px-3 py-1.5 rounded-full shrink-0 whitespace-nowrap" style={{background:'#FBEFE6',color:'var(--clay-deep)'}}>🔥 {streak} day{streak===1?'':'s'}</div>
        </div>
      </div>

      <div className="max-w-2xl mx-auto px-3.5 sm:px-4 pt-4 sm:pt-5">
        {!loaded ? <div className="text-center py-20 font-bold" style={{color:'var(--muted)'}}>Loading your dashboard…</div> :
         tab==="today" ? <TodayView today={today} data={todayData} progress={progress} toggle={toggle} resetDay={resetDay} onRest={onRest} streak={streak} weekCount={weekCount} quote={quote} weightLog={weightLog} addWeight={addWeight}/> :
         tab==="plan" ? <PlanView progress={progress} toggle={toggle} resetDay={resetDay} onRest={onRest} today={today}/> :
         tab==="eat" ? <NutritionView/> :
         <TipsView/>}
      </div>

      {/* footer credit */}
      <div className="max-w-2xl mx-auto px-4 mt-8 text-center">
        <p className="text-[12px] font-bold" style={{color:'var(--muted)'}}>Built with 💪 for <span className="grad-text font-black">MAD</span>han Kumar · Keep showing up.</p>
      </div>

      {/* bottom nav */}
      <div className="fixed bottom-0 inset-x-0 z-40" style={{background:'rgba(250,248,243,.92)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--line)'}}>
        <div className="max-w-2xl mx-auto px-2 sm:px-3 pt-2 grid grid-cols-4 gap-1 bottom-safe">
          {tabs.map(t=>(
            <button key={t.k} onClick={()=>{setTab(t.k); window.scrollTo({top:0,behavior:'smooth'});}}
              className="tab-btn flex flex-col items-center gap-0.5 py-2 rounded-2xl"
              style={tab===t.k?{background:'#FBEFE6'}:{}}>
              <span className="text-[19px]" style={{filter:tab===t.k?'none':'grayscale(.4) opacity(.65)'}}>{t.icon}</span>
              <span className="text-[10.5px] font-black" style={{color:tab===t.k?'var(--clay-deep)':'var(--muted)'}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {rest && <RestTimer total={rest.secs} nextLabel={rest.label} onClose={()=>setRest(null)}/>}
      {confetti && <Confetti/>}
    </div>
  );
}

function Confetti(){
  const colors=['#C96442','#E08A5B','#D98E45','#E2AC6A','#7F9270','#B0532F'];
  const pieces=Array.from({length:60}).map((_,i)=>({
    id:i, left:Math.random()*100, delay:Math.random()*1.2, dur:2+Math.random()*1.8,
    c:colors[i%colors.length], w:6+Math.random()*6
  }));
  return (
    <div className="fixed inset-0 pointer-events-none z-[80] overflow-hidden">
      {pieces.map(p=>(
        <div key={p.id} className="conf" style={{left:`${p.left}%`,background:p.c,width:p.w,height:p.w*1.5,
          animation:`fall ${p.dur}s ${p.delay}s linear forwards`}}/>
      ))}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
<script>
(function(){
  function createIcon(sz){
    const c=document.createElement('canvas');
    c.width=c.height=sz;
    const ctx=c.getContext('2d');
    const r=sz*0.22;

    // Rounded square path
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(sz-r,0);
    ctx.arc(sz-r,r,r,-Math.PI/2,0);
    ctx.lineTo(sz,sz-r);
    ctx.arc(sz-r,sz-r,r,0,Math.PI/2);
    ctx.lineTo(r,sz);
    ctx.arc(r,sz-r,r,Math.PI/2,Math.PI);
    ctx.lineTo(0,r);
    ctx.arc(r,r,r,Math.PI,-Math.PI/2);
    ctx.closePath();

    // Clay-to-amber gradient fill
    const g=ctx.createLinearGradient(0,0,sz,sz);
    g.addColorStop(0,'#CE6A47');
    g.addColorStop(0.5,'#E08A5B');
    g.addColorStop(1,'#DC9447');
    ctx.fillStyle=g; ctx.fill();

    // Inner radial glow (depth)
    const gl=ctx.createRadialGradient(sz*.5,sz*.36,0,sz*.5,sz*.36,sz*.48);
    gl.addColorStop(0,'rgba(255,255,255,.22)');
    gl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gl;
    ctx.beginPath(); ctx.arc(sz/2,sz*.36,sz*.48,0,2*Math.PI); ctx.fill();

    // Bold "M" — primary letter
    ctx.fillStyle='rgba(255,255,255,.97)';
    ctx.textAlign='center';
    ctx.textBaseline='alphabetic';
    ctx.font='900 '+Math.round(sz*.56)+'px "Nunito Sans",system-ui,-apple-system,sans-serif';
    ctx.fillText('M',sz/2,sz*.66);

    // "FIT" sub-label
    ctx.fillStyle='rgba(255,255,255,.70)';
    ctx.font='800 '+Math.round(sz*.185)+'px "Nunito Sans",system-ui,-apple-system,sans-serif';
    ctx.fillText('FIT',sz/2,sz*.85);

    return c.toDataURL('image/png');
  }

  function boot(){
    const i192=createIcon(192);
    const i512=createIcon(512);
    const i32 =createIcon(32);

    // iOS "Add to Home Screen" icon
    const al=document.createElement('link');
    al.rel='apple-touch-icon'; al.sizes='192x192'; al.href=i192;
    document.head.appendChild(al);

    // Browser tab favicon
    const fl=document.createElement('link');
    fl.rel='icon'; fl.type='image/png'; fl.sizes='32x32'; fl.href=i32;
    document.head.appendChild(fl);

    // PWA web app manifest (blob URL — works on Android/Chrome)
    const manifest={
      name:'MADFIT — Lean & Strong',
      short_name:'MADFIT',
      description:'Personal fat-loss training dashboard by @madvibe',
      start_url: location.pathname||'/',
      scope: location.pathname||'/',
      display:'standalone',
      background_color:'#FAF8F3',
      theme_color:'#C96442',
      orientation:'portrait-primary',
      categories:['health','fitness'],
      icons:[
        {src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
        {src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
      ]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    const ml=document.createElement('link');
    ml.rel='manifest'; ml.href=URL.createObjectURL(blob);
    document.head.appendChild(ml);
  }

  // Wait for Nunito Sans to load so icon text renders crisp
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(boot).catch(boot);
  } else {
    window.addEventListener('load',boot);
  }
})();
</script>
</body>
